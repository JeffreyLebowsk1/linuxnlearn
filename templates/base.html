<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LinuxNLearn{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">
                🖥️ LinuxNLearn
            </a>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('category', category='networking') }}">Networking</a>
                <a href="{{ url_for('category', category='cisco') }}">Cisco</a>
                <a href="{{ url_for('category', category='python') }}">Python</a>
                <a href="{{ url_for('category', category='linux') }}">Linux</a>
                <a href="{{ url_for('assistant') }}" class="btn-ai">🤖 AI Assistant</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>LinuxNLearn — AI-assisted education for networking, Cisco, Python &amp; Linux</p>
            <p>Ever-expanding as you learn 🚀</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
