<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LinuxNLearn{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">🖥️ LinuxNLearn</a>
            <ul class="nav-links">
                {% for key, cat in categories.items() %}
                <li><a href="{{ url_for('category', category=key) }}">{{ cat.icon }} {{ cat.title }}</a></li>
                {% endfor %}
                <li><a href="{{ url_for('chat') }}">💬 AI Chat</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>LinuxNLearn — AI-assisted IT education. Always expanding.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
