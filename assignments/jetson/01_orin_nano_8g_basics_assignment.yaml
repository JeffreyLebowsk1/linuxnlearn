title: "App 1 Assignment: Edge Health Sentinel"
category: "jetson"
difficulty: "beginner"
estimated_minutes: 30
related_lesson: "01_orin_nano_8g_basics"
instructions: |
  Build and deliver **App 1: Edge Health Sentinel**.
  Your app must expose health APIs and a live dashboard for Jetson readiness.

tasks:
  - id: 1
    type: "multiple_choice"
    points: 10
    question: "Which utility is most commonly used on Jetson to monitor live GPU/CPU/thermal metrics?"
    options:
      - "nvidia-smi"
      - "tegrastats"
      - "iotop"
      - "perfmon"
    answer: 1
    explanation: "tegrastats is the standard telemetry tool on Jetson systems."

  - id: 2
    type: "multiple_choice"
    points: 10
    question: "Which Python check confirms CUDA support is available to PyTorch?"
    options:
      - "torch.cuda.detect()"
      - "torch.gpu.ready()"
      - "torch.cuda.is_available()"
      - "torch.cuda.version()"
    answer: 2
    explanation: "torch.cuda.is_available() returns True when CUDA is available to the runtime."

  - id: 3
    type: "practical"
    points: 20
    question: |
      Implement the backend API for App 1:
      1. Create `/api/health` returning CUDA status and uptime
      2. Create `/api/metrics` returning sampled CPU/memory metrics
      3. Return valid JSON with timestamp fields
      4. Add one failure-state response when telemetry is unavailable
    rubric: |
      Award up to 20 points:
      - Routes implemented with correct JSON schema (6 pts)
      - CUDA status and key metrics are accurate (6 pts)
      - Includes timestamp and failure handling (4 pts)
      - Code clarity and maintainability (4 pts)
    sample_answer: |
      from flask import Flask, jsonify
      import time
      import torch

      app = Flask(__name__)
      START = time.time()

      @app.route('/api/health')
      def health():
          return jsonify({
              'ok': True,
              'cuda_available': torch.cuda.is_available(),
              'uptime_sec': int(time.time() - START),
              'timestamp': int(time.time())
          })

  - id: 4
    type: "short_answer"
    points: 20
    question: |
      App 1 release note task:
      Write a short release note describing:
      - What your dashboard currently measures
      - Two known limitations
      - One concrete next improvement for App 2 integration
    rubric: |
      Full-credit answers should include all three sections clearly,
      show realistic system-awareness, and propose an App 2-ready improvement.
    sample_answer: |
      Release Notes v1.0

      Included metrics: CUDA availability, uptime, memory %, CPU %, timestamp.
      Known limits: no persistent storage; telemetry parser not robust to malformed lines.
      Next improvement: push health events into App 2 queue service for unified monitoring.