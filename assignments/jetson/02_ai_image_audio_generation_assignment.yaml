title: "App 2 Assignment: Prompt Studio"
category: "jetson"
difficulty: "intermediate"
estimated_minutes: 35
related_lesson: "02_ai_image_audio_generation"
instructions: |
  Build and deliver **App 2: Prompt Studio**.
  One prompt should produce both an image output and an audio narration output.

tasks:
  - id: 1
    type: "multiple_choice"
    points: 10
    question: "What is usually the safest first optimization for generation on Jetson Orin Nano 8GB?"
    options:
      - "Increase image size to 2048x2048"
      - "Use FP16 and moderate resolution"
      - "Disable queueing"
      - "Run as many concurrent jobs as possible"
    answer: 1
    explanation: "FP16 plus moderate resolution typically improves memory and latency behavior on 8GB devices."

  - id: 2
    type: "multiple_choice"
    points: 10
    question: "Why is a request queue helpful for edge generation services?"
    options:
      - "It eliminates model loading time entirely"
      - "It guarantees zero latency"
      - "It controls concurrency and prevents overload"
      - "It removes the need for logs"
    answer: 2
    explanation: "Queues cap concurrent work and reduce out-of-memory and instability risks."

  - id: 3
    type: "practical"
    points: 20
    question: |
      Implement Prompt Studio core flow:
      1. Create `/api/generate` that accepts prompt + style preset
      2. Queue requests with max concurrency of 1
      3. Generate one image artifact and one audio artifact
      4. Return output paths and elapsed processing time
    rubric: |
      Award up to 20 points:
      - API and payload structure are clear and valid (5 pts)
      - Queue/concurrency control is correctly implemented (5 pts)
      - Both artifacts are produced and saved consistently (5 pts)
      - Response includes timing and artifact metadata (5 pts)
    sample_answer: |
      from queue import Queue
      import time

      jobs = Queue()

      def submit(prompt):
          job_id = str(time.time())
          jobs.put((job_id, prompt))
          return {"job_id": job_id, "status": "queued"}

      def worker_loop():
          while True:
              job_id, prompt = jobs.get()
              t0 = time.time()
              # output_path = generate(prompt)
              output_path = f"outputs/{job_id}.png"
              elapsed = time.time() - t0
              print({"job_id": job_id, "output": output_path, "elapsed": elapsed})
              jobs.task_done()

  - id: 4
    type: "short_answer"
    points: 20
    question: |
      Uniqueness requirement:
      Define one unique Prompt Studio mode (for example, "retro robotics poster"
      or "industrial safety briefing"). Explain:
      - Why it is unique
      - What prompt template it uses
      - What output quality checks you apply
    rubric: |
      Full-credit response defines a concrete unique mode, includes template logic,
      and gives at least 3 quality checks.
    sample_answer: |
      Unique mode: "Factory Floor Incident Briefing"
      Why unique: combines visual hazard scene generation with concise spoken safety summary.
      Prompt template: "Create a {style} image showing {scenario} with highlighted hazard zones..."
      Quality checks: no clipped audio, image dimensions match target, response under 8 seconds median.