title: "App 3 Capstone Assignment: Vision Narrator"
category: "jetson"
difficulty: "intermediate"
estimated_minutes: 35
related_lesson: "03_torchvision_vision"
instructions: |
  Build and deliver **App 3: Vision Narrator** as your capstone.
  Your app must perform live vision inference and produce event-based narration.

grading_guidance:
  total_points: 60
  pass_threshold: 42
  mastery_levels:
    - level: "Needs Improvement"
      score_range: "0-29"
      guidance: "Prioritize a stable live inference loop and correct device placement first."
    - level: "Developing"
      score_range: "30-41"
      guidance: "Core loop runs; improve event filtering, narration timing, and snapshot reliability."
    - level: "Pass"
      score_range: "42-50"
      guidance: "Capstone requirements met; tune FPS/latency and improve deployment readiness."
    - level: "Strong Pass"
      score_range: "51-56"
      guidance: "Reliable capstone with clear domain focus and strong event handling."
    - level: "Distinction"
      score_range: "57-60"
      guidance: "Production-quality capstone with robust logs, clear runbook, and measurable optimization outcomes."

submission_checklist:
  - "Live camera inference demo (minimum 2 minutes)"
  - "Narration triggered by at least 3 meaningful event types"
  - "Saved snapshots and event metadata logs"
  - "Unique domain variant description and rationale"
  - "Capstone README with setup, run, metrics, and troubleshooting"

tasks:
  - id: 1
    type: "multiple_choice"
    points: 10
    question: "Which context is recommended for deployment inference in PyTorch?"
    options:
      - "torch.training_mode()"
      - "torch.inference_mode()"
      - "torch.autograd.enable()"
      - "torch.grad_mode()"
    answer: 1
    explanation: "torch.inference_mode() disables autograd overhead and is ideal for inference workloads."

  - id: 2
    type: "multiple_choice"
    points: 10
    question: "What is the most common first stage in a real-time vision app?"
    options:
      - "Database indexing"
      - "Frame capture and preprocessing"
      - "Model quantization report generation"
      - "Cloud autoscaling"
    answer: 1
    explanation: "Vision pipelines start with frame capture and preprocessing before model inference."

  - id: 3
    type: "practical"
    points: 20
    question: |
      Implement core capstone loop:
      1. Capture live camera frames
      2. Run TorchVision detection/classification on CUDA
      3. Trigger audio narration for selected events
      4. Save event snapshots and metadata logs
    rubric: |
      Award up to 20 points:
      - Stable camera + inference loop implementation (6 pts)
      - Correct event detection and filtering logic (5 pts)
      - Audio narration integration works for event triggers (5 pts)
      - Snapshot/log persistence is implemented (4 pts)
    sample_answer: |
      from torchvision import transforms

      preprocess = transforms.Compose([
          transforms.Resize((224, 224)),
          transforms.ToTensor(),
          transforms.Normalize(
              mean=[0.485, 0.456, 0.406],
              std=[0.229, 0.224, 0.225],
          ),
      ])

      # input_tensor = preprocess(pil_image).unsqueeze(0).to("cuda")

  - id: 4
    type: "short_answer"
    points: 20
    question: |
      Capstone uniqueness pitch:
      Describe your final unique app variant (for example, "Lab Safety Narrator",
      "Smart Inventory Spotter", or "Workshop PPE Monitor").

      Include:
      1. Target user
      2. Primary event classes
      3. Why narration adds value
      4. One metric you will optimize first
    rubric: |
      Full-credit responses provide concrete domain framing, actionable class/event design,
      clear value proposition for narration, and a measurable optimization target.
    sample_answer: |
      Variant: "Workshop PPE Monitor"
      Target user: training supervisors in a fabrication lab.
      Event classes: helmet missing, goggles missing, high-risk tool active.
      Narration value: immediate audible warning when visual attention is elsewhere.
      First metric: reduce missed critical events while maintaining >=15 FPS.