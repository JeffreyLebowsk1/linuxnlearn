title: "VLANs (Virtual Local Area Networks)"
order: 2
summary: "VLANs allow you to segment a physical network into multiple logical networks, improving security, performance, and manageability."
sections:
  - heading: "What is a VLAN?"
    content: |
      A **VLAN** is a logical grouping of devices on a network, regardless of physical location. Devices in the same VLAN communicate as if they are on the same physical switch, even if they are not.

      **Benefits:**
      - **Security** – Isolate sensitive departments (HR, Finance)
      - **Performance** – Reduce broadcast domains
      - **Flexibility** – Group users by function, not location
      - **Simplicity** – Easier management of large networks

  - heading: "Default VLAN and Reserved VLANs"
    content: |
      | VLAN | Description |
      |---|---|
      | VLAN 1 | Default VLAN (all ports start here) |
      | VLAN 1002-1005 | Legacy Token Ring/FDDI VLANs |
      | VLAN 1006-4094 | Extended range VLANs |

      > **Best practice:** Don't use VLAN 1 for production traffic. Create a dedicated management VLAN.

  - heading: "Configuring VLANs on a Switch"
    content: |
      ```
      SW1# configure terminal

      ! Create VLANs
      SW1(config)# vlan 10
      SW1(config-vlan)# name Sales
      SW1(config-vlan)# exit

      SW1(config)# vlan 20
      SW1(config-vlan)# name Engineering
      SW1(config-vlan)# exit

      ! Assign access port to VLAN
      SW1(config)# interface fastethernet 0/1
      SW1(config-if)# switchport mode access
      SW1(config-if)# switchport access vlan 10
      SW1(config-if)# exit
      ```

  - heading: "Trunk Ports"
    content: |
      A **trunk port** carries traffic for **multiple VLANs** between switches. It uses **802.1Q tagging** to identify which VLAN each frame belongs to.

      ```
      ! Configure trunk port between switches
      SW1(config)# interface gigabitethernet 0/1
      SW1(config-if)# switchport mode trunk
      SW1(config-if)# switchport trunk native vlan 99   ! Native VLAN (untagged)
      SW1(config-if)# switchport trunk allowed vlan 10,20,30
      SW1(config-if)# exit
      ```

  - heading: "Verifying VLANs"
    content: |
      ```
      SW1# show vlan brief                    ! All VLANs and assigned ports
      SW1# show interfaces trunk              ! Trunk ports and allowed VLANs
      SW1# show interfaces fa0/1 switchport   ! Switchport config for one port
      SW1# show vlan id 10                    ! Details for VLAN 10
      ```

  - heading: "Inter-VLAN Routing"
    content: |
      Devices in different VLANs cannot communicate without a **Layer 3 device** (router or Layer 3 switch).

      **Option 1: Router-on-a-Stick**
      ```
      R1(config)# interface gigabitethernet 0/0.10
      R1(config-subif)# encapsulation dot1Q 10
      R1(config-subif)# ip address 192.168.10.1 255.255.255.0

      R1(config)# interface gigabitethernet 0/0.20
      R1(config-subif)# encapsulation dot1Q 20
      R1(config-subif)# ip address 192.168.20.1 255.255.255.0
      ```

quiz:
  - question: "What is the purpose of a trunk port?"
    options: ["Connect end-user devices to the network", "Carry traffic for multiple VLANs between switches", "Provide internet access", "Block unauthorized VLANs"]
    answer: 1
    explanation: "A trunk port carries traffic for multiple VLANs between switches using 802.1Q tagging."

  - question: "Which VLAN is the default VLAN on Cisco switches?"
    options: ["VLAN 0", "VLAN 1", "VLAN 100", "VLAN 4094"]
    answer: 1
    explanation: "VLAN 1 is the default VLAN. All switch ports belong to VLAN 1 by default."
