      4. **Memory Screenshot**
        - `tegrastats` output comparing GPU memory usage between PyTorch and TensorRT runs

  - heading: "Homework"
    content: |
      Homework task:
      - Build a `benchmark_all.py` script that tests both apps and produces a single JSON report.
      - Try batch size 2 and 4 — does TensorRT benefit more from batching than PyTorch?
      - Add the TensorRT engine load/fallback pattern to App 2 and record the speed-up.

quiz:
  - question: "What does TensorRT do to improve inference performance?"
    options:
      - "Downloads a faster model from the internet"
      - "Fuses layers, tunes kernels, and compiles a device-specific engine"
      - "Adds more CPU threads automatically"
      - "Replaces CUDA with CPU computation"
    answer: 1
    explanation: "TensorRT applies graph fusion, precision reduction, and kernel auto-tuning to compile an optimized engine for the target GPU."

  - question: "What is required to use INT8 precision with TensorRT that FP16 does not need?"
    options:
      - "A larger GPU with more VRAM"
      - "A calibration dataset to compute activation ranges"
      - "Internet access during compilation"
      - "A special NVIDIA license"
    answer: 1
    explanation: "INT8 quantization requires a calibration dataset — representative inputs that TensorRT uses to determine safe activation clipping ranges."

  - question: "Why is a warm-up phase important when benchmarking TensorRT engines?"
    options:
      - "It trains the model on new data"
      - "It allows CUDA kernels to reach steady-state execution times before measurement"
      - "It clears the Python garbage collector"
      - "It prevents thermal throttling from starting"
    answer: 1
    explanation: "The first few GPU inferences include JIT compilation and cache warm-up overhead; running warm-up iterations gives stable, representative latency measurements."
